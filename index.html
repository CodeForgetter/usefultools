<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>验收工具</title>
<style>
:root {
  --bg: #f6f7fb;
  --card: #fff;
  --border: #e5e7eb;
  --primary: #2563eb;
  --primary-soft: #eff6ff;
  --muted: #6b7280;
  --text: #111827;
  --shadow: 0 4px 16px rgba(0, 0, 0, .06);
}
* { box-sizing: border-box; }
body {
  margin: 0;
  min-height: 100vh;
  background: var(--bg);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  color: var(--text);
}
.page {
  max-width: 920px;
  margin: 0 auto;
  padding: 48px 16px 64px;
}
.hero {
  text-align: center;
  margin-bottom: 32px;
}
.hero h1 {
  margin: 0 0 10px;
  font-size: 28px;
  font-weight: 700;
  letter-spacing: .5px;
}
.hero p {
  margin: 0;
  color: var(--muted);
  font-size: 14px;
  line-height: 1.7;
}
.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}
@media (max-width: 720px) {
  .grid { grid-template-columns: 1fr; }
}
.module-card {
  display: flex;
  flex-direction: column;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 24px 24px 20px;
  box-shadow: var(--shadow);
  transition: transform .15s, box-shadow .15s, border-color .15s;
  text-decoration: none;
  color: inherit;
  min-height: 220px;
}
.module-card:hover {
  transform: translateY(-2px);
  border-color: #93c5fd;
  box-shadow: 0 10px 28px rgba(37, 99, 235, .12);
}
.module-card .icon {
  width: 48px;
  height: 48px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  margin-bottom: 16px;
}
.module-card.qe .icon { background: #dbeafe; }
.module-card.token .icon { background: #dcfce7; }
.module-card h2 {
  margin: 0 0 8px;
  font-size: 18px;
  font-weight: 700;
}
.module-card .desc {
  flex: 1;
  margin: 0 0 18px;
  color: var(--muted);
  font-size: 13px;
  line-height: 1.65;
}
.module-card .tags {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 18px;
}
.tag {
  font-size: 11px;
  padding: 3px 8px;
  border-radius: 999px;
  background: #f3f4f6;
  color: #4b5563;
  font-weight: 600;
}
.module-card .enter {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 10px 14px;
  border-radius: 8px;
  background: var(--primary);
  color: #fff;
  font-size: 14px;
  font-weight: 600;
}
.module-card:hover .enter { background: #1d4ed8; }
.footer {
  margin-top: 28px;
  text-align: center;
  color: var(--muted);
  font-size: 12px;
  line-height: 1.6;
}
</style>
</head>
<body>
<main class="page">
  <header class="hero">
    <h1>验收工具箱</h1>
    <p>浏览器端离线验收平台 · 选择下方模块进入对应工具</p>
  </header>

  <div class="grid">
    <a class="module-card qe" href="roomname_qe_review.html">
      <div class="icon">🔍</div>
      <h2>房型译名质检验收</h2>
      <p class="desc">上传质检 Excel，逐酒店验收房型译名准确性；支持标注持久化、数据统计与导出。</p>
      <div class="tags">
        <span class="tag">译名质检</span>
        <span class="tag">准确率概览</span>
        <span class="tag">导出 HTML / Excel</span>
      </div>
      <span class="enter">进入工具 →</span>
    </a>

    <a class="module-card token" href="roomname_token_review.html">
      <div class="icon">✂️</div>
      <h2>房型分词分类验收</h2>
      <p class="desc">上传分词分类结构与验收 Excel，酒店维度逐房型审核分词与分类；支持汇总多个验收 HTML 快照。</p>
      <div class="tags">
        <span class="tag">分词分类</span>
        <span class="tag">高频分词统计</span>
        <span class="tag">汇总 HTML</span>
      </div>
      <span class="enter">进入工具 →</span>
    </a>
  </div>

  <p class="footer">所有数据均在浏览器本地处理，不上传服务器。</p>
</main>
</body>
</html>
